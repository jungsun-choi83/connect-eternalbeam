# DNS: connect → 이 서버의 공인 IP (A 레코드)
# SSL: certbot 등으로 인증서 발급 후 경로만 맞추세요.

upstream eternalbeam_connect {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name connect.eternalbeam.com;

    ssl_certificate     /etc/letsencrypt/live/connect.eternalbeam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/connect.eternalbeam.com/privkey.pem;

    client_max_body_size 1m;

    location / {
        proxy_pass http://eternalbeam_connect;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name connect.eternalbeam.com;
    return 301 https://connect.eternalbeam.com$request_uri;
}
